version: "3"

services:
  apisix:
    image: yorkane/apisix-aio
    restart: always
    container_name: apisix-aio
    volumes:
      - "./apisix_config.yml:/usr/local/apisix/conf/config.yaml:ro"
      - "./etcd/:/usr/local/apisix/default.etcd/"
    environment:
      - APISIX_STAND_ALONE=false
      - ETCD_ADVERTISE_CLIENT_URLS=http://apisix-aio:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9443:9443/tcp"
      - "9092:9092/tcp"
      - "9100:9100"
      # - "2379:2379/tcp"
    networks:
      apisix:
  dashboard:
    image: "yorkane/apisix-dashboard:latest"
    container_name: apisix-dashboard
    extra_hosts: 
      - "etcd.d:host-gateway"
    restart: always
    volumes:
      - "./dashboard_conf.yml:/usr/local/apisix-dashboard/conf/conf.yaml:ro"
    ports:
      - "9000:9000/tcp"
    networks:
      - apisix
networks:
  apisix:
    driver: bridge