version: "3"

services:
  apisix:
    image: "ghcr.io/yorkane/apisix-aio:latest"
    restart: always
    container_name: apisix-aio
    volumes:
      - "./apisix_config.yml:/usr/local/apisix/conf/config.yaml:ro"
      - "./etcd/:/usr/local/apisix/default.etcd/"
    environment:
      - APISIX_STAND_ALONE=false
      - ETCD_ADVERTISE_CLIENT_URLS=http://apisix-aio:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "80:9080/tcp"
      - "443:9443/tcp"
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9443:9443/tcp"
      - "9092:9092/tcp"
      - "9100:9100"
      - "60002:60002"
      # - "2379:2379/tcp"
    networks:
      - apisix

  acme:
    image: neilpang/acme.sh:latest
    container_name: acme-sh
    command: daemon
    env_file:
      - .env
    volumes:
      - "./acme:/acme.sh"
    networks:
      - apisix

  dashboard:
    image: "ghcr.io/yorkane/apisix-dashboard:latest"
    container_name: apisix-dashboard
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -c
      - >
        cp /usr/local/apisix-dashboard/conf/conf.yaml /tmp/conf.yaml &&
        if [ -n "$$DASHBOARD_ADMIN_PASSWORD" ]; then
          sed -i "s/password: admin@890.COM/password: $$DASHBOARD_ADMIN_PASSWORD/" /tmp/conf.yaml;
        fi &&
        /usr/local/apisix-dashboard/manager-api -p /usr/local/apisix-dashboard -c /tmp/conf.yaml
    extra_hosts: 
      - "etcd.d:host-gateway"
    restart: always
    volumes:
      - "./dashboard_conf.yml:/usr/local/apisix-dashboard/conf/conf.yaml:ro"
    ports:
      - "9000:9000/tcp"
    networks:
      - apisix
networks:
  apisix:
    driver: bridge